<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark rounded background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <!-- Crust color -->
    <linearGradient id="crust" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="40%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <!-- Inner bread (cream/pale yellow) -->
    <linearGradient id="bread" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#FEF9EC"/>
      <stop offset="40%" stop-color="#FEF0C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <!-- Highlight sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- TOAST SHAPE: characteristic bread slice silhouette -->
  <!-- Outer crust shape: squarish with rounded corners, slight dome on top, tapers slightly at shoulders -->
  <path d="
    M 512 108
    C 620 108, 720 128, 776 178
    C 820 218, 836 268, 836 320
    L 836 790
    C 836 830, 804 862, 764 862
    L 260 862
    C 220 862, 188 830, 188 790
    L 188 320
    C 188 268, 204 218, 248 178
    C 304 128, 404 108, 512 108
    Z
  " fill="url(#crust)"/>

  <!-- Inner bread face (inset from crust) -->
  <path d="
    M 512 158
    C 608 158, 696 175, 746 218
    C 782 250, 796 292, 796 336
    L 796 790
    C 796 808, 782 822, 764 822
    L 260 822
    C 242 822, 228 808, 228 790
    L 228 336
    C 228 292, 242 250, 278 218
    C 328 175, 416 158, 512 158
    Z
  " fill="url(#bread)"/>

  <!-- Subtle highlight sheen (diagonal) -->
  <path d="
    M 512 158
    C 608 158, 696 175, 746 218
    C 782 250, 796 292, 796 336
    L 796 560
    L 440 158
    Z
  " fill="url(#sheen)"/>

  <!-- Clock face (white circle centered on bread) -->
  <circle cx="512" cy="510" r="200" fill="white" opacity="0.92"/>
  <circle cx="512" cy="510" r="200" fill="none" stroke="#C2855A" stroke-width="10"/>

  <!-- Hour tick marks -->
  <line x1="512" y1="318" x2="512" y2="348" stroke="#7C4A1E" stroke-width="12" stroke-linecap="round"/>
  <line x1="704" y1="510" x2="674" y2="510" stroke="#7C4A1E" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="702" x2="512" y2="672" stroke="#7C4A1E" stroke-width="12" stroke-linecap="round"/>
  <line x1="320" y1="510" x2="350" y2="510" stroke="#7C4A1E" stroke-width="12" stroke-linecap="round"/>

  <!-- Minor ticks -->
  <line x1="610" y1="326" x2="603" y2="340" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="686" y1="402" x2="672" y2="409" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="686" y1="618" x2="672" y2="611" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="610" y1="694" x2="603" y2="680" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="414" y1="694" x2="421" y2="680" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="338" y1="618" x2="352" y2="611" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="338" y1="402" x2="352" y2="409" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>
  <line x1="414" y1="326" x2="421" y2="340" stroke="#C2855A" stroke-width="7" stroke-linecap="round"/>

  <!-- Hour hand (~10) -->
  <line x1="512" y1="510" x2="442" y2="405" stroke="#3B1C08" stroke-width="20" stroke-linecap="round"/>
  <!-- Minute hand (~2) -->
  <line x1="512" y1="510" x2="582" y2="365" stroke="#3B1C08" stroke-width="13" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="512" y1="510" x2="512" y2="650" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
  <line x1="512" y1="510" x2="512" y2="455" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="512" cy="510" r="14" fill="#3B1C08"/>
  <circle cx="512" cy="510" r="6" fill="#DC2626"/>

  <!-- Traffic light dots -->
  <circle cx="382" cy="920" r="30" fill="#22C55E"/>
  <circle cx="512" cy="920" r="30" fill="#EAB308"/>
  <circle cx="642" cy="920" r="30" fill="#EF4444"/>
</svg>
